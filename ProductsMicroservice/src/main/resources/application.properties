spring.application.name=ProductsMicroservice

# For window: [::1]:9092
spring.kafka.producer.bootstrap-servers=localhost:9092,localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# All is a Spring Boot configuration that sets the Apache Kafka producer's acknowledgment 
# requirement to its highest reliability level
spring.kafka.producer.acks=all

# Default retries: Integer.MAX_VALUE = 2,147,483,647 
spring.kafka.producer.retries=10
# spring.kafka.producer.properties.retry.backoff.ms=1000

spring.kafka.producer.properties.delivery.timeout.ms=120000

spring.kafka.producer.properties.linger.ms=0 
spring.kafka.producer.properties.request.timeout.ms=30000

# True is used in Spring Boot applications to ensure that the Kafka producer 
# delivers messages exactly once to a partition, preventing duplicates caused by network retries or failures
# true requires spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

app.kafka.topics.product-created=product-created-events-topic
app.kafka.topics.product-created-secondary=topic2
