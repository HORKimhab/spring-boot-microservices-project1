# Load .env file
spring.config.import=optional:file:.env[.properties]

spring.application.name=EmailNotificationMicroservice

# For window: [::1]:9092
spring.kafka.consumer.bootstrap-servers=${BOOTSTRAP_SERVERS:localhost:9092,localhost:9094}
spring.kafka.consumer.group-id=${GROUP_ID:product-created-events}
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.reanit.ws.core.ProductCreatedEvent
# spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.trusted.packages=com.reanit.ws.core
spring.kafka.consumer.product-created-topic=product-created-events-topic

# Config db 
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:passwordBitcoin}
spring.datasource.url=${DB_URL:"jdbc:h2:mem:testdb"}
spring.datasource.driverClassName=${DB_DRIVE_CLASS:"org.h2.Driver"}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${DB_CONSOLE_ENABLED:true}